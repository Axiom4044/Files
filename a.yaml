# 订阅转换自定义模板

# 策略组配置
proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - 手动切换
      - 自动选择
      - 新加坡节点
      - 香港节点
      - 台湾节点
      - 日本节点
      - 美国节点
      - 韩国节点
      - DIRECT

  - name: 手动切换
    type: select
    include-all: true

  - name: 自动选择
    type: url-test
    include-all: true
    interval: 300
    tolerance: 10

  - name: 香港节点
    type: url-test
    include-all: true
    filter: "(?i)港|HK|hk|Hong Kong|HongKong|hongkong"
    interval: 300
    tolerance: 10

  - name: 日本节点
    type: url-test
    include-all: true
    filter: "(?i)日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan"
    interval: 300
    tolerance: 10

  - name: 美国节点
    type: url-test
    include-all: true
    filter: "(?i)美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉ラ|西雅图|芝加哥|US|United States"
    interval: 300
    tolerance: 10

  - name: 台湾节点
    type: url-test
    include-all: true
    filter: "(?i)台|新北|彰化|TW|Taiwan"
    interval: 300
    tolerance: 10

  - name: 新加坡节点
    type: url-test
    include-all: true
    filter: "(?i)新加坡|坡|SG|Singapore"
    interval: 300
    tolerance: 10

  - name: 韩国节点
    type: url-test
    include-all: true
    filter: "(?i)KR|Korea|KOR|首尔|韩|韓"
    interval: 300
    tolerance: 10

  - name: Telegram
    type: select
    proxies:
      - 节点选择
