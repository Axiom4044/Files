[common]
# 可以在此处添加您的其他通用设置，例如：
# target=clash

[custom_groups]
# 格式: custom_group=策略组名`type`子策略组1`子策略组2`...`图标
# 带有自动测试的格式: custom_group=策略组名`url-test`节点过滤正则`测试URL`测试间隔`容差`图标

# 节点选择
custom_group=节点选择`select`[]手动切换`[]自动选择`[]新加坡节点`[]香港节点`[]台湾节点`[]日本节点`[]美国节点`[]韩国节点`[]DIRECT

# 手动切换
custom_group=手动切换`select`.*

# 自动选择
custom_group=自动选择`url-test`.*`http://cp.cloudflare.com/generate_204`300`10

# 香港节点
custom_group=香港节点`url-test`(?i)港|HK|hk|Hong Kong|HongKong|hongkong`http://cp.cloudflare.com/generate_204`300`10

# 日本节点
custom_group=日本节点`url-test`(?i)日本|川日|东京|大阪|泉日|埼玉|沪日|深日|JP|Japan`http://cp.cloudflare.com/generate_204`300`10

# 美国节点
custom_group=美国节点`url-test`(?i)美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉ラ|西雅图|芝加哥|US|United States`http://cp.cloudflare.com/generate_204`300`10

# 台湾节点
custom_group=台湾节点`url-test`(?i)台|新北|彰化|TW|Taiwan`http://cp.cloudflare.com/generate_204`300`10

# 新加坡节点
custom_group=新加坡节点`url-test`(?i)新加坡|坡|SG|Singapore`http://cp.cloudflare.com/generate_204`300`10

# 韩国节点
custom_group=韩国节点`url-test`(?i)KR|Korea|KOR|首尔|韩|韓`http://cp.cloudflare.com/generate_204`300`10

